# Koubou Highlight & Zoom Example
# Demonstrates highlight annotations and zoom callout features

project:
  name: "Highlight & Zoom Showcase"
  output_dir: "output"
  device: "iPhone 16 Pro - Black Titanium - Portrait"
  output_size: "iPhone6_9"  # 1320x2868

defaults:
  background:
    type: "linear"
    colors: ["#667eea", "#764ba2"]
    direction: 135

screenshots:
  highlight_demo:
    content:
      - type: "image"
        asset: "screenshots/app_screen.png"
        position: ["50%", "55%"]
        scale: 0.85

      # Circle highlight on the "Featured Deal" section
      - type: "highlight"
        shape: "circle"
        position: ["35%", "57%"]
        dimensions: ["22%", "10%"]
        border_color: "#FF3B30"
        border_width: 5
        fill_color: "#FF3B3018"

      # Rounded rect highlight on the "Add to Cart" button
      - type: "highlight"
        shape: "rounded_rect"
        position: ["46%", "62%"]
        dimensions: ["22%", "5%"]
        border_color: "#34C759"
        border_width: 4
        corner_radius: 20

      - type: "text"
        content: "Highlight Key Features"
        position: ["50%", "10%"]
        size: 56
        color: "#ffffff"
        weight: "bold"

      - type: "text"
        content: "Draw attention to what matters"
        position: ["50%", "16%"]
        size: 28
        color: "#ffffffcc"

  spotlight_demo:
    content:
      - type: "image"
        asset: "screenshots/app_screen.png"
        position: ["50%", "55%"]
        scale: 0.85

      # Spotlight mode: dims everything except the highlighted area
      - type: "highlight"
        shape: "rounded_rect"
        position: ["50%", "45%"]
        dimensions: ["60%", "15%"]
        border_color: "#FF9500"
        border_width: 4
        corner_radius: 20
        spotlight: true
        spotlight_opacity: 0.6

      - type: "text"
        content: "Spotlight Mode"
        position: ["50%", "10%"]
        size: 56
        color: "#ffffff"
        weight: "bold"

      - type: "text"
        content: "Dim everything except the focus area"
        position: ["50%", "16%"]
        size: 28
        color: "#ffffffcc"

  blur_demo:
    content:
      - type: "image"
        asset: "screenshots/app_screen.png"
        position: ["50%", "55%"]
        scale: 0.85

      # Blur background: blur everything outside the highlight
      - type: "highlight"
        shape: "circle"
        position: ["50%", "50%"]
        dimensions: ["40%", "20%"]
        border_color: "#007AFF"
        border_width: 4
        blur_background: true
        blur_radius: 25

      - type: "text"
        content: "Blur Background"
        position: ["50%", "10%"]
        size: 56
        color: "#ffffff"
        weight: "bold"

  zoom_demo:
    content:
      - type: "image"
        asset: "screenshots/app_screen.png"
        position: ["50%", "55%"]
        scale: 0.85

      # Zoom with shadow, source indicator, and facing connector
      - type: "zoom"
        source_position: ["72%", "38%"]
        source_size: ["22%", "5%"]
        display_position: ["30%", "80%"]
        display_size: ["45%", "12%"]
        shape: "rounded_rect"
        border_color: "#007AFF"
        border_width: 5
        corner_radius: 24
        shadow: true
        shadow_blur: 20
        shadow_offset: ["0", "8"]
        source_indicator: true
        source_indicator_style: "border"
        connector: true
        connector_style: "facing"
        connector_color: "#007AFF80"
        connector_width: 2
        connector_fill: "#007AFF10"

      - type: "text"
        content: "Zoom Into Details"
        position: ["50%", "10%"]
        size: 56
        color: "#ffffff"
        weight: "bold"

      - type: "text"
        content: "Magnify any area with source indicator"
        position: ["50%", "16%"]
        size: 28
        color: "#ffffffcc"

  zoom_level_demo:
    content:
      - type: "image"
        asset: "screenshots/app_screen.png"
        position: ["50%", "55%"]
        scale: 0.85

      # Zoom using zoom_level shorthand (auto-calculates display_size)
      - type: "zoom"
        source_position: ["50%", "45%"]
        source_size: ["15%", "8%"]
        display_position: ["50%", "82%"]
        zoom_level: 2.5
        shape: "circle"
        border_color: "#FF3B30"
        border_width: 4
        shadow: true
        connector: true
        connector_style: "curved"
        connector_color: "#FF3B3080"
        connector_width: 2

      - type: "text"
        content: "Zoom Level Shorthand"
        position: ["50%", "10%"]
        size: 56
        color: "#ffffff"
        weight: "bold"

      - type: "text"
        content: "Just set zoom_level: 2.5 for 2.5x magnification"
        position: ["50%", "16%"]
        size: 28
        color: "#ffffffcc"

  combined_demo:
    background:
      type: "linear"
      colors: ["#0F2027", "#203A43", "#2C5364"]
      direction: 180
    content:
      - type: "image"
        asset: "screenshots/app_screen.png"
        position: ["50%", "50%"]
        scale: 0.78

      # Highlight the product grid area with shadow
      - type: "highlight"
        shape: "rounded_rect"
        position: ["50%", "35%"]
        dimensions: ["72%", "22%"]
        border_color: "#FF9500"
        border_width: 4
        fill_color: "#FF950015"
        corner_radius: 24
        shadow: true

      # Zoom into the Wireless Earbuds price with facing connector
      - type: "zoom"
        source_position: ["32%", "38%"]
        source_size: ["18%", "4%"]
        display_position: ["70%", "82%"]
        display_size: ["40%", "10%"]
        shape: "rounded_rect"
        border_color: "#FF9500"
        border_width: 4
        corner_radius: 20
        shadow: true
        connector: true
        connector_style: "facing"
        connector_color: "#FF950080"
        connector_width: 2
        connector_fill: "#FF950010"
        source_indicator: true
        source_indicator_style: "dashed"

      - type: "text"
        content: "Highlight + Zoom"
        position: ["50%", "7%"]
        size: 56
        color: "#ffffff"
        weight: "bold"

      - type: "text"
        content: "Combine annotations for maximum impact"
        position: ["50%", "13%"]
        size: 26
        color: "#ffffffbb"
